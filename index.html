<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>صفحة تحميل الملفات</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f0f2f5;
            margin: 0;
        }
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .download-btn {
            display: inline-block;
            padding: 15px 25px;
            font-size: 16px;
            color: white;
            background-color: #28a745;
            text-decoration: none;
            border-radius: 8px;
            text-align: center;
            transition: background 0.3s, transform 0.2s;
            cursor: pointer;
            border: none;
        }
        .download-btn:hover {
            background-color: #218838;
            transform: translateY(-2px);
        }
        .download-btn:active {
            transform: translateY(0);
        }
        h2 { color: #333; margin-bottom: 20px; }
    </style>
</head>
<body>

    <h2>مركز تحميل الملفات</h2>

    <div class="grid-container">
        <!-- الزر الأول -->
        <a href="files/file1.pdf" download="الملف_الأول" class="download-btn">تنزيل الملف الأول</a>
        
        <!-- الزر الثاني -->
        <a href="files/image.jpg" download="الصورة_المختارة" class="download-btn">تنزيل الصورة</a>
        
        <!-- الزر الثالث -->
        <a href="files/report.docx" download="التقرير_السنوي" class="download-btn">تنزيل التقرير</a>
        
        <!-- الزر الرابع -->
        <a href="files/app.zip" download="الملف_المضغوط" class="download-btn">تنزيل البرنامج</a>
    </div>

</body>
</html>
